<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#667eea" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="时空探险家" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="description" content="游戏化答题应用 - 在探险中学习历史与地理，每日挑战、成就系统、智能推荐">
    <meta name="keywords" content="历史,地理,答题,学习,教育,游戏">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192x192.png" />
    
    <title>时空探险家 - 历史知识挑战</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
    
    <!-- PWA Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/space1/sw.js')
            .then((registration) => {
              console.log('SW registered:', registration.scope)
              
              // 检测更新
              registration.addEventListener('updatefound', () => {
                const newWorker = registration.installing
                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    // 有新版本，提示刷新
                    if (confirm('发现新版本，是否立即更新？')) {
                      newWorker.postMessage('SKIP_WAITING')
                      window.location.reload()
                    }
                  }
                })
              })
              
              // 监听SW消息
              navigator.serviceWorker.addEventListener('message', (event) => {
                if (event.data.type === 'UPDATE_AVAILABLE') {
                  console.log('New version available:', event.data.version)
                }
              })
            })
            .catch((error) => {
              console.log('SW registration failed:', error)
            })
            
          // 定期检查更新（每30分钟）
          setInterval(() => {
            registration.update()
          }, 30 * 60 * 1000)
        })
      }
    </script>
  </body>
</html>
